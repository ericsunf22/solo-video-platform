server:
  port: 8080

spring:
  application:
    name: solo-video-platform
  
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 10GB
  
  datasource:
    url: jdbc:h2:file:./data/video_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  file:
    storage:
      path: ./storage/videos
      cover-path: ./storage/covers
      temp-path: ./storage/temp
    scan:
      supported-formats: mp4,avi,mkv,mov,flv,wmv,webm,m4v
  video:
    cover:
      extract-time: 1000
      quality: 0.8
    stream:
      buffer-size: 8192
  backup:
    path: ./storage/backups
    keep-days: 7
    mysqldump-path: mysqldump
    pgdump-path: pg_dump
    scheduled:
      enabled: true
      cron: 0 0 2 * * ?

info:
  app:
    version: 1.0.0
